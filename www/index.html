<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <meta http-equiv="Content-Security-Policy" content="default-src * 'self' 'unsafe-inline' 'unsafe-eval' data: blob: gap:; style-src * 'unsafe-inline'; media-src *; img-src * data: blob:;">
  <title>Mini Genius</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <!-- Debug Log Overlay -->
  <div id="debugLog" style="position:fixed;top:0;left:0;right:0;z-index:99999;background:rgba(0,0,0,.85);color:#0f0;font-size:11px;font-family:monospace;padding:8px;max-height:40vh;overflow-y:auto;direction:ltr;text-align:left;display:block;">
    <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
      <b>DEBUG LOG</b>
      <span onclick="document.getElementById('debugLog').style.display='none'" style="cursor:pointer;color:red;font-size:16px;">X</span>
    </div>
    <div id="debugMessages"></div>
  </div>

  <!-- Splash Screen -->
  <div class="splash-screen" id="splashScreen">
    <img src="img/splash.png" alt="Mini Genius">
  </div>

  <div class="header">
    <h1>Mini Genius</h1>
    <span class="header-sub" id="saveIndicator"></span>
  </div>
  <div class="job-selector" id="jobSelector"></div>
  <div class="tab-bar" id="tabBar"></div>
  <div id="mainContent">
    <div class="loading"><div class="spinner"></div><br>Loading...</div>
  </div>
  <button class="fab" id="fab">+</button>
  <div class="fab-menu" id="fabMenu">
    <button class="fab-item" onclick="Stage1.renderForm();Utils.id('fab').click();">
      <span class="fab-icon">+</span> New Candidate
    </button>
    <button class="fab-item" onclick="App.navigate('dashboard');Utils.id('fab').click();">
      <span class="fab-icon">D</span> Dashboard
    </button>
    <button class="fab-item" onclick="App.navigate('tasks');Utils.id('fab').click();">
      <span class="fab-icon">T</span> Tasks
    </button>
    <button class="fab-item" onclick="App.navigate('daysummary');Utils.id('fab').click();">
      <span class="fab-icon">S</span> Day Summary
    </button>
    <button class="fab-item" onclick="App.navigate('admin');Utils.id('fab').click();">
      <span class="fab-icon">A</span> Admin
    </button>
  </div>

  <!-- Debug helper - catches all errors -->
  <script>
    var _dbgEl=null;
    function _dbg(msg){
      try{
        if(!_dbgEl)_dbgEl=document.getElementById('debugMessages');
        if(_dbgEl){
          var d=new Date();
          var ts=d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0')+'.'+String(d.getMilliseconds()).padStart(3,'0');
          _dbgEl.innerHTML+='<div>['+ts+'] '+msg+'</div>';
          _dbgEl.scrollTop=_dbgEl.scrollHeight;
        }
      }catch(e){}
    }
    window.onerror=function(msg,url,line,col,err){
      _dbg('<span style="color:red">ERROR: '+msg+' ('+url+':'+line+':'+col+')</span>');
      return false;
    };
    window.addEventListener('unhandledrejection',function(e){
      _dbg('<span style="color:orange">PROMISE REJECT: '+e.reason+'</span>');
    });
    _dbg('Page loaded');
    _dbg('UserAgent: '+navigator.userAgent.substring(0,80));
  </script>

  <script src="cordova.js"></script>
  <script>_dbg('cordova.js loaded');</script>
  <script src="js/db.js"></script>
  <script>_dbg('db.js loaded');</script>
  <script src="js/utils.js"></script>
  <script>_dbg('utils.js loaded');</script>
  <script src="js/stages.js"></script>
  <script>_dbg('stages.js loaded');</script>
  <script src="js/stage1.js"></script>
  <script>_dbg('stage1.js loaded');</script>
  <script src="js/stage2.js"></script>
  <script>_dbg('stage2.js loaded');</script>
  <script src="js/stage3.js"></script>
  <script>_dbg('stage3.js loaded');</script>
  <script src="js/admin.js"></script>
  <script>_dbg('admin.js loaded');</script>
  <script src="js/dashboard.js"></script>
  <script>_dbg('dashboard.js loaded');</script>
  <script src="js/tasks.js"></script>
  <script>_dbg('tasks.js loaded');</script>
  <script src="js/daysummary.js"></script>
  <script>_dbg('daysummary.js loaded');</script>
  <script src="js/app.js"></script>
  <script>
    _dbg('app.js loaded');
    _dbg('window.cordova='+(typeof window.cordova));
    _dbg('Waiting for deviceready or DOMContentLoaded...');
    document.addEventListener('deviceready',function(){_dbg('EVENT: deviceready fired');},false);
    document.addEventListener('DOMContentLoaded',function(){_dbg('EVENT: DOMContentLoaded fired');},false);
  </script>
</body>
</html>
